<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1450" viewBox="0 0 1500 1450" role="img" aria-labelledby="title desc">
  <title id="title">Graph Code StateGraph Topology</title>
  <desc id="desc">Topology diagram for the main LangGraph StateGraph, including model routing, permission interrupts, tool execution, compaction, recovery, and final response paths.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .terminal { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
      .route { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
      .interrupt { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; }
      .tool { fill: #ecfdf5; stroke: #047857; stroke-width: 2; }
      .recovery { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
      .edge { fill: none; stroke: #475569; stroke-width: 2.2; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .label { fill: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 650; text-anchor: middle; dominant-baseline: middle; }
      .small { fill: #334155; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .edge-label { fill: #334155; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 650; text-anchor: middle; dominant-baseline: middle; }
      .title { fill: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 30px; font-weight: 750; text-anchor: middle; }
      .subtitle { fill: #475569; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; text-anchor: middle; }
      .note { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; }
      .note-text { fill: #334155; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="1450"/>
  <text class="title" x="750" y="48">Graph Code StateGraph Topology</text>
  <text class="subtitle" x="750" y="76">Main LangGraph agent loop: model routing, permission interrupts, tools, compaction, recovery, and final response.</text>

  <!-- Main spine nodes -->
  <rect class="terminal" x="690" y="115" width="120" height="52" rx="26"/>
  <text class="label" x="750" y="141">START</text>

  <rect class="node" x="580" y="210" width="340" height="58" rx="12"/>
  <text class="label" x="750" y="239">drain_notifications</text>

  <rect class="node" x="580" y="305" width="340" height="58" rx="12"/>
  <text class="label" x="750" y="334">build_prompt</text>

  <rect class="node" x="580" y="400" width="340" height="58" rx="12"/>
  <text class="label" x="750" y="429">call_model</text>

  <rect class="recovery" x="580" y="495" width="340" height="58" rx="12"/>
  <text class="label" x="750" y="524">recovery_handler</text>

  <polygon class="route" points="750,600 945,675 750,750 555,675"/>
  <text class="label" x="750" y="668">route_model</text>
  <text class="small" x="750" y="694">response</text>

  <polygon class="route" points="750,835 945,910 750,985 555,910"/>
  <text class="label" x="750" y="903">permission</text>
  <text class="small" x="750" y="929">gate</text>

  <!-- Tool execution chain -->
  <rect class="tool" x="580" y="1060" width="340" height="58" rx="12"/>
  <text class="label" x="750" y="1089">run_pre_tool_hooks</text>

  <rect class="tool" x="580" y="1160" width="340" height="58" rx="12"/>
  <text class="label" x="750" y="1189">execute_tools</text>

  <rect class="tool" x="580" y="1260" width="340" height="58" rx="12"/>
  <text class="label" x="750" y="1289">run_post_tool_hooks</text>

  <rect class="tool" x="150" y="1160" width="340" height="58" rx="12"/>
  <text class="label" x="320" y="1189">append_tool_results</text>

  <rect class="node" x="150" y="1260" width="340" height="58" rx="12"/>
  <text class="label" x="320" y="1289">compact_check</text>

  <rect class="recovery" x="150" y="1360" width="340" height="58" rx="12"/>
  <text class="label" x="320" y="1389">recovery_handler_after_tools</text>

  <!-- Side routes -->
  <rect class="interrupt" x="1060" y="880" width="340" height="70" rx="12"/>
  <text class="label" x="1230" y="905">human_permission</text>
  <text class="small" x="1230" y="929">interrupt()</text>

  <rect class="node" x="120" y="760" width="320" height="58" rx="12"/>
  <text class="label" x="280" y="789">final_response</text>

  <rect class="terminal" x="220" y="875" width="120" height="52" rx="26"/>
  <text class="label" x="280" y="901">END</text>

  <!-- Notes -->
  <rect class="note" x="1015" y="960" width="430" height="70" rx="10"/>
  <text class="note-text" x="1230" y="982">interrupt payload: tool_call_id, tool_name,</text>
  <text class="note-text" x="1230" y="1003">args preview, reason, risk</text>

  <rect class="note" x="58" y="1080" width="410" height="58" rx="10"/>
  <text class="note-text" x="263" y="1101">ToolResultEnvelope -> ToolMessage</text>
  <text class="note-text" x="263" y="1122">preserves provider tool-call protocol</text>

  <rect class="note" x="980" y="415" width="390" height="70" rx="10"/>
  <text class="note-text" x="1175" y="438">model protocol is validated before</text>
  <text class="note-text" x="1175" y="459">provider calls to avoid 400 errors</text>

  <!-- Main vertical edges -->
  <path class="edge" d="M750 167 L750 210"/>
  <path class="edge" d="M750 268 L750 305"/>
  <path class="edge" d="M750 363 L750 400"/>
  <path class="edge" d="M750 458 L750 495"/>
  <path class="edge" d="M750 553 L750 600"/>

  <!-- route_model_response edges -->
  <path class="edge-soft" d="M632 645 C450 555 450 430 580 429"/>
  <text class="edge-label" x="476" y="530">retry</text>

  <path class="edge" d="M750 750 L750 835"/>
  <text class="edge-label" x="790" y="792">tools</text>

  <path class="edge" d="M555 675 C420 680 310 710 285 760"/>
  <text class="edge-label" x="405" y="708">final</text>

  <!-- permission_gate edges -->
  <path class="edge" d="M945 910 L1060 915"/>
  <text class="edge-label" x="1005" y="892">interrupt</text>

  <path class="edge" d="M750 985 L750 1060"/>
  <text class="edge-label" x="792" y="1020">execute</text>

  <path class="edge" d="M590 950 C455 1015 350 1080 323 1160"/>
  <text class="edge-label" x="470" y="1035">append</text>

  <path class="edge" d="M555 910 C420 890 315 850 288 818"/>
  <text class="edge-label" x="420" y="872">final</text>

  <!-- human_permission_interrupt routes -->
  <path class="edge-soft" d="M1230 880 C1230 750 980 785 875 860"/>
  <text class="edge-label" x="1126" y="786">permission</text>

  <path class="edge" d="M1060 935 C960 995 875 1030 820 1060"/>
  <text class="edge-label" x="955" y="1015">execute</text>

  <path class="edge" d="M1060 945 C830 1065 560 1125 490 1180"/>
  <text class="edge-label" x="780" y="1088">append</text>

  <!-- Tool chain edges -->
  <path class="edge" d="M750 1118 L750 1160"/>
  <path class="edge" d="M750 1218 L750 1260"/>
  <path class="edge" d="M580 1289 L490 1200"/>
  <path class="edge" d="M320 1218 L320 1260"/>
  <path class="edge" d="M320 1318 L320 1360"/>

  <!-- Back loop after tools -->
  <path class="edge-soft" d="M490 1388 C1130 1388 1290 520 920 430"/>
  <text class="edge-label" x="1165" y="1015">next model call</text>

  <!-- Final edge -->
  <path class="edge" d="M280 818 L280 875"/>
</svg>
