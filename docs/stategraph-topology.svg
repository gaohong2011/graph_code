<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">Graph Code StateGraph Topology</title>
  <desc id="desc">Compact topology diagram for the main LangGraph StateGraph. The primary execution path is a vertical spine, with retry, denied append, final response, and human interrupt shown as side branches.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5,1.5 L9.5,5.5 L1.5,9.5 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .terminal { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
      .decision { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
      .interrupt { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; }
      .tool { fill: #ecfdf5; stroke: #047857; stroke-width: 2; }
      .recovery { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
      .edge { fill: none; stroke: #475569; stroke-width: 2.2; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .edge-muted { fill: none; stroke: #94a3b8; stroke-width: 1.8; marker-end: url(#arrow); }
      .title { fill: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 29px; font-weight: 800; text-anchor: middle; }
      .subtitle { fill: #475569; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; text-anchor: middle; }
      .label { fill: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 650; text-anchor: middle; dominant-baseline: middle; }
      .small { fill: #334155; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
      .edge-label { fill: #334155; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .legend { fill: #334155; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1000" height="1000"/>
  <text class="title" x="500" y="38">Graph Code StateGraph Topology</text>
  <text class="subtitle" x="500" y="62">Primary path stays on the center spine. Side branches are routed outside the spine to avoid crossings.</text>

  <!-- Main spine nodes -->
  <rect class="terminal" x="445" y="78" width="110" height="38" rx="19"/>
  <text class="label" x="500" y="97">START</text>

  <rect class="node" x="375" y="132" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="152">drain_notifications</text>

  <rect class="node" x="375" y="187" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="207">build_prompt</text>

  <rect class="node" x="375" y="242" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="262">call_model</text>

  <rect class="recovery" x="375" y="297" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="317">recovery_handler</text>

  <polygon class="decision" points="500,360 630,407 500,454 370,407"/>
  <text class="label" x="500" y="400">route_model</text>
  <text class="small" x="500" y="421">response</text>

  <polygon class="decision" points="500,480 630,527 500,574 370,527"/>
  <text class="label" x="500" y="520">permission</text>
  <text class="small" x="500" y="541">gate</text>

  <rect class="tool" x="375" y="600" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="620">run_pre_tool_hooks</text>

  <rect class="tool" x="375" y="655" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="675">execute_tools</text>

  <rect class="tool" x="375" y="710" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="730">run_post_tool_hooks</text>

  <rect class="tool" x="375" y="765" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="785">append_tool_results</text>

  <rect class="node" x="375" y="820" width="250" height="40" rx="9"/>
  <text class="label" x="500" y="840">compact_check</text>

  <rect class="recovery" x="330" y="875" width="340" height="40" rx="9"/>
  <text class="label" x="500" y="895">recovery_handler_after_tools</text>

  <!-- Final response branch -->
  <rect class="node" x="720" y="382" width="230" height="44" rx="9"/>
  <text class="label" x="835" y="404">final_response</text>

  <rect class="terminal" x="780" y="456" width="110" height="38" rx="19"/>
  <text class="label" x="835" y="475">END</text>

  <!-- Human permission interrupt branch -->
  <rect class="interrupt" x="720" y="502" width="230" height="52" rx="10"/>
  <text class="label" x="835" y="523">human_permission</text>
  <text class="small" x="835" y="542">interrupt()</text>

  <!-- Main vertical path -->
  <path class="edge" d="M500 116 V132"/>
  <path class="edge" d="M500 172 V187"/>
  <path class="edge" d="M500 227 V242"/>
  <path class="edge" d="M500 282 V297"/>
  <path class="edge" d="M500 337 V360"/>
  <path class="edge" d="M500 454 V480"/>
  <path class="edge" d="M500 574 V600"/>
  <path class="edge" d="M500 640 V655"/>
  <path class="edge" d="M500 695 V710"/>
  <path class="edge" d="M500 750 V765"/>
  <path class="edge" d="M500 805 V820"/>
  <path class="edge" d="M500 860 V875"/>

  <!-- Conditional side branches -->
  <path class="edge-soft" d="M370 407 H210 V262 H375"/>
  <text class="edge-label" x="225" y="334">retry</text>

  <path class="edge" d="M630 407 H720"/>
  <text class="edge-label" x="675" y="388">final</text>

  <path class="edge" d="M630 527 H720"/>
  <text class="edge-label" x="675" y="508">interrupt</text>

  <path class="edge-soft" d="M720 554 C680 595 650 575 630 535"/>
  <text class="edge-label" x="690" y="590">resume</text>

  <path class="edge-muted" d="M370 527 H260 V785 H375"/>
  <text class="edge-label" x="260" y="660">denied append</text>

  <path class="edge-soft" d="M330 895 H120 V262 H375"/>
  <text class="edge-label" x="120" y="930">next model call</text>

  <!-- Final branch continuation -->
  <path class="edge" d="M835 426 V456"/>

  <text class="legend" x="500" y="965">Exact conditional edge set is listed in the Mermaid source below this image.</text>
</svg>
